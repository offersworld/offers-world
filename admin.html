<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — عالم العروض v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0A0A14; --card:#12121F; --card2:#1A1A2E;
      --accent:#7B2FBE; --orange:#FF6B00; --green:#22C55E;
      --red:#EF4444; --yellow:#F59E0B; --text:#E0E0FF; --muted:#94A3B8;
      --border:rgba(123,47,190,0.25);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:linear-gradient(135deg,#0A0A14,#1A0B2E);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    .stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .stars::before{content:'';position:absolute;inset:0;background-image:radial-gradient(white 1px,transparent 1px);background-size:80px 80px;opacity:0.08;animation:twinkle 8s infinite alternate;}
    @keyframes twinkle{0%{opacity:.04}100%{opacity:.13}}

    .btn{padding:11px 22px;border:none;border-radius:14px;font-weight:700;cursor:pointer;transition:all .3s;font-size:0.95rem;}
    .btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,0.3);}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#A855F7);color:white;}
    .btn-success{background:linear-gradient(90deg,var(--green),#86EFAC);color:#0a0a0a;}
    .btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;}
    .btn-ghost{background:rgba(123,47,190,.12);border:1px solid rgba(123,47,190,.35);color:var(--accent);}

    #loginPage{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0A0A14,#1A0B2E);}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:48px 36px;width:100%;max-width:400px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.6);}

    .sidebar{width:270px;background:var(--card);border-left:1px solid var(--border);position:fixed;top:0;right:0;height:100vh;z-index:50;display:flex;flex-direction:column;padding:24px 0;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:14px 24px;cursor:pointer;color:var(--muted);font-weight:600;transition:.25s;border-right:4px solid transparent;}
    .nav-item:hover,.nav-item.active{color:white;background:rgba(123,47,190,.18);border-right-color:var(--accent);}

    .main{margin-right:270px;padding:24px;width:calc(100% - 270px);min-height:100vh;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:1.65rem;font-weight:900;}

    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;transition:.4s;}
    .stat-card:hover{transform:translateY(-5px);}

    .table-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:24px;}
    .table-header{padding:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    
    .empty-state{text-align:center;padding:90px 20px;color:var(--muted);}
    .empty-state div{font-size:4.5rem;margin-bottom:16px;opacity:0.7;}

    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.7);}

    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 28px;color:white;font-weight:600;z-index:999;transition:.4s;opacity:0;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    .badge-pending{background:rgba(245,158,11,.2);color:var(--yellow);padding:4px 12px;border-radius:20px;}
    .badge-done{background:rgba(34,197,94,.2);color:var(--green);padding:4px 12px;border-radius:20px;}
    .badge-cancel{background:rgba(239,68,68,.2);color:var(--red);padding:4px 12px;border-radius:20px;}

    @media(max-width:768px){
      .sidebar{display:none;}
      .main{margin-right:0;width:100%;padding:16px;}
    }
  </style>
</head>
<body>
<div class="stars"></div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">🌟</div>
    <h2>لوحة التحكم</h2>
    <p>عالم العروض — للأدمن فقط</p>
    <div class="input-wrap">
      <input type="password" id="adminPass" placeholder="••••••••••••" autocomplete="off">
      <button class="eye-btn" onclick="togglePass()">👁</button>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
    <div id="loginError" style="margin-top:16px;color:#f87171;display:none;">❌ كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span>🌟 عالم العروض</span>
        <small style="color:var(--muted);display:block;margin-top:4px;">v5.0</small>
      </div>
      <nav>
        <div class="nav-item active" onclick="switchTab('dashboard')" id="nav-dashboard">📊 الرئيسية</div>
        <div class="nav-item" onclick="switchTab('orders')" id="nav-orders">📋 الطلبات <span id="sidebarPending" style="background:var(--yellow);color:#000;padding:2px 8px;border-radius:12px;font-size:0.8rem;"></span></div>
        <div class="nav-item" onclick="switchTab('packages')" id="nav-packages">📦 الباقات</div>
        <div class="nav-item" onclick="switchTab('activity')" id="nav-activity">📜 سجل النشاط</div>
      </nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-title" id="pageTitle">📊 الرئيسية</div>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-ghost" id="autoBtn" onclick="toggleAutoRefresh()">🔄 Auto Refresh</button>
          <button class="btn btn-ghost" onclick="loadAllData()">🔄 تحديث</button>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div id="tab-dashboard">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:30px;" id="statsGrid"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:30px;">
          <div class="table-card">
            <div class="table-header"><h3>📈 الطلبات حسب اليوم</h3></div>
            <canvas id="barChart" height="180"></canvas>
          </div>
          <div class="table-card">
            <div class="table-header"><h3>🏢 توزيع الشركات</h3></div>
            <canvas id="pieChart" height="180"></canvas>
          </div>
        </div>

        <div class="table-card">
          <div class="table-header"><h3>🔥 أكثر 5 باقات مطلوبة</h3></div>
          <div id="topPackages" style="padding:20px;"></div>
        </div>
      </div>

      <!-- ORDERS TAB -->
      <div id="tab-orders" style="display:none;">
        <div class="table-card">
          <div class="table-header">
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
              <input type="text" id="searchInput" placeholder="🔍 بحث..." onkeyup="filterOrders()" style="padding:10px 16px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;width:260px;">
              <select id="quickFilter" onchange="filterOrders()" style="padding:10px 16px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;">
                <option value="all">كل الطلبات</option>
                <option value="today">اليوم</option>
                <option value="7days">آخر 7 أيام</option>
                <option value="30days">آخر 30 يوم</option>
                <option value="month">هذا الشهر</option>
              </select>
            </div>
          </div>
          <div style="overflow-x:auto;">
            <table style="width:100%;">
              <thead>
                <tr>
                  <th>رقم الطلب</th><th>الاسم</th><th>الواتساب</th><th>الشركة</th><th>الباقة</th><th>السعر</th><th>التاريخ</th><th>الحالة</th><th>إجراء</th>
                </tr>
              </thead>
              <tbody id="ordersTableBody"></tbody>
            </table>
          </div>
          <div style="padding:15px;text-align:center;" id="pagination"></div>
        </div>
      </div>

      <!-- PACKAGES TAB -->
      <div id="tab-packages" style="display:none;">
        <div class="table-card" style="padding:24px;">
          <button class="btn btn-primary" onclick="openPkgModal(null)" style="margin-bottom:20px;">➕ إضافة باقة جديدة</button>
          <div class="pkg-grid" id="pkgGrid"></div>
        </div>
      </div>

      <!-- ACTIVITY LOG -->
      <div id="tab-activity" style="display:none;">
        <div class="table-card">
          <div class="table-header"><h3>📜 آخر النشاطات</h3></div>
          <div id="activityLog" style="padding:20px;max-height:70vh;overflow-y:auto;"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Order Status Modal -->
<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <h3 style="margin-bottom:20px;">تغيير حالة الطلب</h3>
    <div id="modalOrderId" style="font-weight:700;margin-bottom:10px;"></div>
    <div class="status-options" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0;">
      <button onclick="selectNewStatus('معلق')" class="status-opt opt-pending">⏳ معلق</button>
      <button onclick="selectNewStatus('تم التفعيل')" class="status-opt opt-done">✅ تم</button>
      <button onclick="selectNewStatus('ملغي')" class="status-opt opt-cancel">❌ ملغي</button>
    </div>
    <textarea id="statusNote" placeholder="ملاحظة (اختياري)" style="width:100%;height:80px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;padding:12px;"></textarea>
    <div style="margin-top:24px;display:flex;gap:12px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('statusModal')">إلغاء</button>
      <button class="btn btn-success" style="flex:1;" onclick="saveOrderStatus()">حفظ الحالة</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiNBnJDCgGUVzIG9IZ0CZDgivsEZtl5sXsw7GI7S0jq6Njoyo9hkbYOPI2T0JzdtgR/exec';

let allOrders = [], allPkgs = [], currentPage = 1, itemsPerPage = 15;
let autoRefreshEnabled = false;
let currentOrderId = null, selectedStatus = null;

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function gGet(params) {
  try {
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(`${SCRIPT_URL}?${qs}`);
    return await res.json();
  } catch(e) {
    console.error(e);
    return {success: false};
  }
}

async function gPost(payload) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch(e) {
    console.error(e);
    return {success: false};
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function togglePass() {
  const input = document.getElementById('adminPass');
  input.type = input.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
  const pass = document.getElementById('adminPass').value.trim();
  if (!pass) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = 'جاري التحقق...';
  try {
    const data = await gGet({action: 'checkPassword', pass});
    if (data.success) {
      sessionStorage.setItem('aw_admin', 'true');
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadAllData();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch(e) {
    showToast('❌ فشل الاتصال بالسيرفر');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'دخول';
  }
}

function logout() {
  sessionStorage.removeItem('aw_admin');
  location.reload();
}

function switchTab(tab) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.getElementById(`tab-${tab}`).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${tab}`).classList.add('active');
  document.getElementById('pageTitle').textContent = 
    tab === 'dashboard' ? '📊 الرئيسية' :
    tab === 'orders' ? '📋 الطلبات' :
    tab === 'packages' ? '📦 الباقات' : '📜 سجل النشاط';
}

async function loadAllData() {
  try {
    const [stats, orders, pkgs] = await Promise.all([
      gGet({action:'stats'}),
      gGet({action:'orders'}),
      gGet({action:'packages'})
    ]);

    allOrders = Array.isArray(orders) ? orders : [];
    allPkgs = Array.isArray(pkgs) ? pkgs : [];

    renderStats(stats);
    renderCharts();
    renderTopPackages();
    renderAllOrders();
    updateSidebarPending();
    showToast('✅ تم تحديث جميع البيانات');
  } catch(e) {
    showToast('⚠️ حدث خطأ أثناء تحميل البيانات');
  }
}

function renderStats(stats) {
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div style="color:var(--muted);">إجمالي الطلبات</div><div style="font-size:2.6rem;font-weight:900;">${stats.total || 0}</div></div>
    <div class="stat-card"><div style="color:var(--muted);">معلقة</div><div style="font-size:2.6rem;font-weight:900;color:var(--yellow)">${stats.pending || 0}</div></div>
    <div class="stat-card"><div style="color:var(--muted);">تم التفعيل</div><div style="font-size:2.6rem;font-weight:900;color:var(--green)">${stats.active || 0}</div></div>
    <div class="stat-card"><div style="color:var(--muted);">الإيرادات</div><div style="font-size:2.6rem;font-weight:900;color:var(--green)">${stats.revenue || 0} ج</div></div>
  `;
}

function renderCharts() {
  // Bar Chart
  new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels: ['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء'], datasets: [{ label: 'طلبات', data: [45,62,38,71,55], backgroundColor: '#7B2FBE' }] },
    options: { responsive: true }
  });

  // Pie Chart
  new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: { labels: ['أورانج','فودافون','اتصالات','وي'], datasets: [{ data: [42,28,19,11], backgroundColor: ['#FF6B00','#E60000','#00A651','#8B00FF'] }] },
    options: { responsive: true }
  });
}

function renderTopPackages() {
  const html = allPkgs.slice(0,5).map(p => `
    <div style="padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">
      <div>${esc(p.name)}</div>
      <div style="color:var(--green);font-weight:700;">${esc(p.price)} ج</div>
    </div>
  `).join('');
  document.getElementById('topPackages').innerHTML = html || '<div class="empty-state"><div>📦</div>لا توجد باقات بعد</div>';
}

function updateSidebarPending() {
  const pending = allOrders.filter(o => String(o.status).includes('معلق')).length;
  document.getElementById('sidebarPending').textContent = pending > 0 ? pending : '';
}

function renderAllOrders() {
  const tbody = document.getElementById('ordersTableBody');
  const start = (currentPage - 1) * itemsPerPage;
  const paginated = allOrders.slice(start, start + itemsPerPage);

  tbody.innerHTML = paginated.length ? paginated.map(o => `
    <tr>
      <td>${esc(o.orderId)}</td>
      <td><strong>${esc(o.customerName)}</strong></td>
      <td><a href="https://wa.me/2${o.phone}" target="_blank" style="color:var(--green)">${esc(o.phone)}</a></td>
      <td>${esc(o.company)}</td>
      <td>${esc(o.package)}</td>
      <td style="color:var(--green);font-weight:700;">${esc(o.price)} ج</td>
      <td>${esc(o.date || 'غير محدد')}</td>
      <td>${statusBadge(o.status)}</td>
      <td><button class="btn btn-ghost" onclick="openStatusModal('${esc(o.orderId)}','${esc(o.status)}')">تعديل</button></td>
    </tr>
  `).join('') : `<tr><td colspan="9" class="empty-state"><div>📭</div>لا توجد طلبات مطابقة</td></tr>`;
}

function statusBadge(s) {
  if (s.includes('تم')) return `<span class="badge-done">✅ ${esc(s)}</span>`;
  if (s.includes('ملغ')) return `<span class="badge-cancel">❌ ${esc(s)}</span>`;
  return `<span class="badge-pending">⏳ ${esc(s)}</span>`;
}

function openStatusModal(orderId, currentStatus) {
  currentOrderId = orderId;
  selectedStatus = null;
  document.getElementById('modalOrderId').innerHTML = `رقم الطلب: <strong>${orderId}</strong><br>الحالة الحالية: ${currentStatus || 'معلق'}`;
  document.getElementById('statusModal').classList.add('show');
}

function selectNewStatus(status) {
  selectedStatus = status;
}

async function saveOrderStatus() {
  if (!selectedStatus) return showToast('⚠️ اختر حالة جديدة');
  // هنا يمكنك إضافة gPost لتحديث الحالة
  showToast(`✅ تم تغيير حالة الطلب ${currentOrderId} إلى ${selectedStatus}`);
  closeModal('statusModal');
  loadAllData();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;
  const btn = document.getElementById('autoBtn');
  if (autoRefreshEnabled) {
    btn.style.background = 'rgba(34,197,94,.2)';
    btn.style.color = 'var(--green)';
    autoRefreshInterval = setInterval(loadAllData, 30000);
    showToast('✅ تم تفعيل التحديث التلقائي (كل 30 ثانية)');
  } else {
    clearInterval(autoRefreshInterval);
    btn.style.background = '';
    btn.style.color = '';
    showToast('⏹️ تم إيقاف التحديث التلقائي');
  }
}

function filterOrders() {
  currentPage = 1;
  renderAllOrders();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('aw_admin')) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAllData();
  }
});
</script>
</body>
</html>
