<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — عالم العروض v4.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:#0A0A14; --card:#12121F; --card2:#1A1A2E;
      --accent:#7B2FBE; --orange:#FF6B00; --green:#22C55E;
      --red:#EF4444; --yellow:#F59E0B; --text:#E0E0FF; --muted:#94A3B8;
      --border:rgba(123,47,190,0.25);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:linear-gradient(135deg,#0A0A14,#1A0B2E);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    .stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .stars::before{content:'';position:absolute;inset:0;background-image:radial-gradient(white 1px,transparent 1px);background-size:80px 80px;opacity:0.08;animation:twinkle 8s infinite alternate;}
    @keyframes twinkle{0%{opacity:.04}100%{opacity:.13}}

    .btn{
      padding:11px 22px;border:none;border-radius:14px;font-weight:700;cursor:pointer;
      transition:all .3s cubic-bezier(0.4,0,0.2,1);font-size:0.95rem;display:inline-flex;align-items:center;gap:8px;
    }
    .btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,0.3);}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#A855F7);color:white;}
    .btn-primary:hover{box-shadow:0 10px 30px rgba(123,47,190,0.4);}
    .btn-success{background:linear-gradient(90deg,var(--green),#86EFAC);color:#0a0a0a;}
    .btn-danger{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171;}
    .btn-ghost{background:rgba(123,47,190,.12);border:1px solid rgba(123,47,190,.35);color:var(--accent);}
    .btn-ghost:hover{background:rgba(123,47,190,.25);border-color:var(--accent);}

    #loginPage{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0A0A14,#1A0B2E);}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:28px;padding:48px 36px;width:100%;max-width:400px;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.6);}
    .login-logo{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),var(--orange));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px;box-shadow:0 10px 40px rgba(123,47,190,0.4);}
    .btn-login{width:100%;padding:16px;background:linear-gradient(90deg,var(--accent),var(--orange));border:none;border-radius:14px;color:white;font-size:1.1rem;font-weight:700;margin-top:10px;}

    .layout{display:flex;min-height:100vh;}
    .sidebar{width:260px;background:var(--card);border-left:1px solid var(--border);position:fixed;top:0;right:0;height:100vh;z-index:50;display:flex;flex-direction:column;padding:24px 0;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:14px 24px;cursor:pointer;color:var(--muted);font-weight:600;transition:.25s;border-right:4px solid transparent;}
    .nav-item:hover,.nav-item.active{color:white;background:rgba(123,47,190,.18);border-right-color:var(--accent);}

    .main{margin-right:260px;padding:24px;width:calc(100% - 260px);min-height:100vh;}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:1.6rem;font-weight:900;}

    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:32px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;transition:.4s;}
    .stat-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(123,47,190,.2);}

    .table-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:32px;}
    .table-header{padding:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .search-input{padding:11px 16px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;width:280px;}
    .date-input{padding:10px 14px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;}

    table{width:100%;border-collapse:collapse;}
    thead th{padding:14px 16px;text-align:right;color:var(--muted);font-size:0.85rem;background:rgba(255,255,255,.03);}
    tbody td{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);}
    tbody tr:hover{background:rgba(123,47,190,.07);}

    .orders-mobile{display:none;flex-direction:column;gap:16px;}
    .order-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:18px;}

    .filters-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
    .filter-chip{padding:9px 22px;background:var(--card2);border:1px solid #333;border-radius:30px;color:var(--muted);cursor:pointer;transition:.3s;}
    .filter-chip.active{background:var(--accent);color:white;border-color:var(--accent);}

    .pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
    .pkg-card{background:var(--card2);border:1px solid #2a2a3a;border-radius:18px;padding:20px;transition:.4s;}
    .pkg-card:hover{border-color:var(--accent);transform:translateY(-5px);}

    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.7);}

    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 28px;color:white;font-weight:600;z-index:999;transition:.4s;opacity:0;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

    @media(max-width:768px){
      .sidebar{display:none;}
      .main{margin-right:0;width:100%;padding:16px;}
      .mobile-nav{display:flex;gap:10px;overflow-x:auto;padding-bottom:12px;margin-bottom:20px;}
      .mobile-nav-btn{padding:10px 20px;white-space:nowrap;background:var(--card2);border:1px solid #333;border-radius:9999px;font-size:0.9rem;}
      .mobile-nav-btn.active{background:var(--accent);color:white;}
      table{display:none;}
      .orders-mobile{display:flex;}
    }
  </style>
</head>
<body>
<div class="stars"></div>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">🌟</div>
    <h2>لوحة التحكم</h2>
    <p>عالم العروض — للأدمن فقط</p>
    <div class="input-wrap">
      <input type="password" id="adminPass" placeholder="••••••••••••" autocomplete="off">
      <button class="eye-btn" onclick="togglePass()">👁</button>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
    <div id="loginError" style="margin-top:16px;color:#f87171;display:none;">❌ كلمة المرور غير صحيحة</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span>🌟 عالم العروض</span>
        <small style="display:block;color:var(--muted);margin-top:4px;">v4.0</small>
      </div>
      <nav>
        <div class="nav-item active" onclick="switchTab('dashboard')" id="nav-dashboard">📊 الرئيسية</div>
        <div class="nav-item" onclick="switchTab('orders')" id="nav-orders">📋 الطلبات</div>
        <div class="nav-item" onclick="switchTab('packages')" id="nav-packages">📦 الباقات</div>
      </nav>
      <div style="margin-top:auto;padding:24px;">
        <div id="lastUpdate" style="color:var(--muted);font-size:0.82rem;text-align:center;margin-bottom:16px;"></div>
        <button class="btn btn-danger" style="width:100%;" onclick="logout()">🚪 تسجيل الخروج</button>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-nav">
        <button class="mobile-nav-btn active" onclick="switchTab('dashboard')" id="mnav-dashboard">📊 الرئيسية</button>
        <button class="mobile-nav-btn" onclick="switchTab('orders')" id="mnav-orders">📋 الطلبات</button>
        <button class="mobile-nav-btn" onclick="switchTab('packages')" id="mnav-packages">📦 الباقات</button>
      </div>

      <!-- DASHBOARD -->
      <div id="tab-dashboard">
        <div class="topbar">
          <div class="page-title">📊 الرئيسية</div>
          <button class="btn btn-ghost" onclick="loadAllData()">🔄 تحديث</button>
        </div>
        <div class="stats-grid" id="statsGrid"></div>

        <div class="table-card">
          <div class="table-header"><h3>📈 الإيرادات (آخر 7 أيام)</h3></div>
          <div style="padding:24px;">
            <canvas id="revenueChart" height="135"></canvas>
          </div>
        </div>
      </div>

      <!-- ORDERS -->
      <div id="tab-orders" style="display:none;">
        <div class="topbar">
          <div class="page-title">📋 الطلبات</div>
          <button class="btn btn-ghost" onclick="exportToCSV()">📥 تصدير CSV</button>
        </div>
        <div class="table-card">
          <div class="table-header">
            <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
              <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث..." onkeyup="filterOrders()">
              
              <div style="display:flex;gap:8px;align-items:center;">
                <input type="date" id="dateFrom" class="date-input" onchange="filterOrders()">
                <span style="color:var(--muted);">إلى</span>
                <input type="date" id="dateTo" class="date-input" onchange="filterOrders()">
              </div>

              <select id="statusFilter" onchange="filterOrders()" style="padding:11px 16px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;">
                <option value="">كل الحالات</option>
                <option value="معلق">معلق</option>
                <option value="تم">تم التفعيل</option>
                <option value="ملغ">ملغي</option>
              </select>
            </div>
            <button class="btn btn-ghost" onclick="loadAllData()">🔄 تحديث</button>
          </div>
          <div style="overflow-x:auto;">
            <table>
              <thead>
                <tr>
                  <th>رقم الطلب</th><th>الاسم</th><th>الواتساب</th><th>رقم التفعيل</th>
                  <th>الشركة</th><th>الباقة</th><th>السعر</th><th>التاريخ</th><th>الحالة</th><th>إجراء</th>
                </tr>
              </thead>
              <tbody id="allOrdersBody"></tbody>
            </table>
          </div>
          <div class="orders-mobile" id="ordersMobile"></div>
        </div>
      </div>

      <!-- PACKAGES -->
      <div id="tab-packages" style="display:none;">
        <div class="topbar">
          <div class="page-title">📦 الباقات</div>
          <button class="btn btn-primary" onclick="openPkgModal(null)">➕ إضافة باقة</button>
        </div>
        <div class="table-card" style="padding:24px;">
          <div class="filters-row" id="companyFilters"></div>
          <div id="pkgCount" style="margin:16px 0 20px;color:var(--muted);font-weight:600;"></div>
          <div class="pkg-grid" id="pkgGrid"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Package Modal -->
<div class="modal-overlay" id="pkgModal">
  <div class="modal">
    <button onclick="closeModal('pkgModal')" style="position:absolute;top:20px;left:20px;background:none;border:none;font-size:1.6rem;color:var(--muted);">✕</button>
    <div id="pkgModalTitle" style="font-size:1.4rem;font-weight:700;margin-bottom:24px;">➕ إضافة باقة جديدة</div>
    <input type="hidden" id="pkgRowIndex">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div>
        <label style="display:block;margin-bottom:6px;color:#ddd;">الشركة *</label>
        <select id="pkgCompany" style="width:100%;padding:13px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;">
          <option value="">اختر</option>
          <option value="أورانج">أورانج</option>
          <option value="فودافون">فودافون</option>
          <option value="اتصالات">اتصالات</option>
          <option value="وي">وي</option>
        </select>
      </div>
      <div>
        <label style="display:block;margin-bottom:6px;color:#ddd;">النوع</label>
        <select id="pkgType" style="width:100%;padding:13px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;">
          <option value="">اختر</option>
          <option value="جيجا+دقايق">جيجا+دقايق</option>
          <option value="جيجا">جيجا فقط</option>
          <option value="دقايق فقط">دقايق فقط</option>
          <option value="ميكس">ميكس</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <label style="display:block;margin-bottom:6px;color:#ddd;">اسم الباقة *</label>
      <input type="text" id="pkgName" style="width:100%;padding:13px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;" placeholder="مثال: 30 جيجا + 3000 دقيقة">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div>
        <label style="display:block;margin-bottom:6px;color:#ddd;">السعر *</label>
        <input type="text" id="pkgPrice" style="width:100%;padding:13px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;direction:ltr;" placeholder="370">
      </div>
      <div>
        <label style="display:block;margin-bottom:6px;color:#ddd;">الحالة</label>
        <select id="pkgStatus" style="width:100%;padding:13px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;">
          <option value="متاح">متاح ✅</option>
          <option value="مخفي">مخفي 🔒</option>
        </select>
      </div>
    </div>

    <div>
      <label style="display:block;margin-bottom:6px;color:#ddd;">ملاحظات</label>
      <input type="text" id="pkgNotes" style="width:100%;padding:13px;background:var(--card2);border:1px solid #333;border-radius:12px;color:white;">
    </div>

    <div style="display:flex;gap:12px;margin-top:32px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="closeModal('pkgModal')">إلغاء</button>
      <button class="btn btn-primary" style="flex:1;" id="pkgSaveBtn" onclick="savePackage()">💾 حفظ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyiNBnJDCgGUVzIG9IZ0CZDgivsEZtl5sXsw7GI7S0jq6Njoyo9hkbYOPI2T0JzdtgR/exec';

let allOrders = [], allPkgs = [], revenueChartInstance = null, currentOrderId = null, selectedNewStatus = null, currentPkgFilter = 'all';

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function gPost(payload) {
  const res = await fetch(SCRIPT_URL, {method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload)});
  return res.json();
}

async function gGet(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${SCRIPT_URL}?${qs}`);
  return res.json();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function togglePass() {
  const i = document.getElementById('adminPass');
  i.type = i.type === 'password' ? 'text' : 'password';
}

async function doLogin() {
  const pass = document.getElementById('adminPass').value.trim();
  if (!pass) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = 'جاري التحقق...';
  try {
    const data = await gGet({action:'checkPassword', pass});
    if (data.success) {
      sessionStorage.setItem('aw_admin', 'true');
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadAllData();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch(e) { showToast('❌ فشل الاتصال'); }
  finally { btn.disabled = false; btn.innerHTML = 'دخول'; }
}

function logout() {
  sessionStorage.removeItem('aw_admin');
  location.reload();
}

function switchTab(name) {
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
  document.getElementById(`tab-${name}`).style.display = 'block';

  document.querySelectorAll('.nav-item, .mobile-nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`nav-${name}`)?.classList.add('active');
  document.getElementById(`mnav-${name}`)?.classList.add('active');
}

async function loadAllData() {
  try {
    const [stats, orders, pkgs] = await Promise.all([
      gGet({action:'stats'}),
      gGet({action:'orders'}),
      gGet({action:'packages'})
    ]);

    allOrders = Array.isArray(orders) ? orders : [];
    allPkgs = Array.isArray(pkgs) ? pkgs : [];

    renderStats(stats);
    renderLatestOrders();
    renderAllOrders();
    renderPackages();
    renderCompanyFilters();

    document.getElementById('lastUpdate').textContent = 'آخر تحديث: ' + new Date().toLocaleTimeString('ar-EG');
    showToast('✅ تم تحديث البيانات');
  } catch(e) {
    showToast('❌ فشل تحميل البيانات');
  }
}

function renderStats(stats) {
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div style="color:var(--muted);">إجمالي الطلبات</div><div style="font-size:2.5rem;font-weight:900;">${stats.total||0}</div></div>
    <div class="stat-card"><div style="color:var(--muted);">معلقة</div><div style="font-size:2.5rem;font-weight:900;color:var(--yellow)">${stats.pending||0}</div></div>
    <div class="stat-card"><div style="color:var(--muted);">تم التفعيل</div><div style="font-size:2.5rem;font-weight:900;color:var(--green)">${stats.active||0}</div></div>
    <div class="stat-card"><div style="color:var(--muted);">الإيرادات</div><div style="font-size:2.5rem;font-weight:900;color:var(--green)">${stats.revenue||0} ج</div></div>
  `;
}

function renderRevenueChart() {
  const ctx = document.getElementById('revenueChart');
  if (revenueChartInstance) revenueChartInstance.destroy();
  revenueChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: ['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'],
      datasets: [{ label: 'الإيرادات', data: [1350,2100,980,2650,1780,2340,1890], borderColor: '#7B2FBE', tension: 0.4, borderWidth: 3 }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
}

function renderLatestOrders() {
  const tbody = document.getElementById('latestOrdersBody');
  const latest = [...allOrders].reverse().slice(0, 5);
  tbody.innerHTML = latest.map(o => `
    <tr>
      <td>${esc(o.orderId||'-')}</td>
      <td><strong>${esc(o.customerName||'-')}</strong></td>
      <td>${esc(o.package||'-')}</td>
      <td style="color:var(--green);font-weight:700;">${esc(o.price||0)} ج</td>
      <td>${statusBadge(o.status)}</td>
    </tr>
  `).join('');
}

function statusBadge(s) {
  s = String(s || 'معلق');
  if (s.includes('تم')) return `<span style="background:rgba(34,197,94,.2);color:var(--green);padding:4px 12px;border-radius:20px;font-size:0.8rem;">✅ ${esc(s)}</span>`;
  if (s.includes('ملغ')) return `<span style="background:rgba(239,68,68,.2);color:#f87171;padding:4px 12px;border-radius:20px;font-size:0.8rem;">❌ ${esc(s)}</span>`;
  return `<span style="background:rgba(245,158,11,.2);color:var(--yellow);padding:4px 12px;border-radius:20px;font-size:0.8rem;">⏳ ${esc(s)}</span>`;
}

function renderAllOrders(filtered = null) {
  const orders = filtered || allOrders;
  const tbody = document.getElementById('allOrdersBody');
  const mobile = document.getElementById('ordersMobile');

  tbody.innerHTML = orders.map(o => `
    <tr>
      <td>${esc(o.orderId||'-')}</td>
      <td><strong>${esc(o.customerName||'-')}</strong></td>
      <td><a href="https://wa.me/2${o.phone}" target="_blank" style="color:var(--green);">${esc(o.phone||'-')}</a></td>
      <td>${esc(o.activationPhone||'-')}</td>
      <td>${esc(o.company||'-')}</td>
      <td>${esc(o.package||'-')}</td>
      <td style="color:var(--green);font-weight:700;">${esc(o.price||0)} ج</td>
      <td>${esc(o.date || '-')}</td>
      <td>${statusBadge(o.status)}</td>
      <td><button class="btn btn-ghost" onclick="openOrderStatus('${esc(o.orderId)}','${esc(o.status||'')}')">تعديل</button></td>
    </tr>
  `).join('');

  mobile.innerHTML = orders.map(o => `
    <div class="order-card">
      <div style="display:flex;justify-content:space-between;">
        <strong>#${esc(o.orderId)}</strong>
        ${statusBadge(o.status)}
      </div>
      <div style="margin:10px 0;"><strong>${esc(o.customerName)}</strong></div>
      <div>${esc(o.package)}</div>
      <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--green);font-weight:700;">${esc(o.price)} ج</span>
        <button class="btn btn-ghost" onclick="openOrderStatus('${esc(o.orderId)}','${esc(o.status||'')}')">تعديل الحالة</button>
      </div>
    </div>
  `).join('');
}

function filterOrders() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const st = document.getElementById('statusFilter').value;
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;

  const filtered = allOrders.filter(o => {
    const matchQ = !q || 
      (o.customerName||'').toLowerCase().includes(q) ||
      (o.phone||'').includes(q) ||
      (o.orderId||'').toLowerCase().includes(q);

    const matchS = !st || String(o.status||'').includes(st);
    return matchQ && matchS;
  });

  renderAllOrders(filtered);
}

function openOrderStatus(orderId, currentStatus) {
  currentOrderId = orderId;
  selectedNewStatus = null;
  // يمكنك توسيع هذه الدالة بمودال كامل
  showToast(`جاري تعديل حالة الطلب: ${orderId}`);
}

function renderCompanyFilters() {
  const companies = ['all', 'أورانج', 'فودافون', 'اتصالات', 'وي'];
  let html = `<button class="filter-chip active" data-co="all" onclick="filterPackages('all')">الكل</button>`;
  companies.slice(1).forEach(co => {
    html += `<button class="filter-chip" data-co="${co}" onclick="filterPackages('${co}')">${co}</button>`;
  });
  document.getElementById('companyFilters').innerHTML = html;
}

function filterPackages(co) {
  currentPkgFilter = co;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.dataset.co === co));
  renderPackages();
}

function renderPackages() {
  let filtered = allPkgs;
  if (currentPkgFilter !== 'all') {
    filtered = allPkgs.filter(p => (p.company || '').includes(currentPkgFilter));
  }
  document.getElementById('pkgCount').textContent = `${filtered.length} باقة`;

  const grid = document.getElementById('pkgGrid');
  grid.innerHTML = filtered.map(p => `
    <div class="pkg-card">
      <div style="display:flex;justify-content:space-between;">
        <div style="color:var(--muted);">${esc(p.company)}</div>
        <span style="padding:3px 12px;border-radius:20px;font-size:0.8rem;${p.status==='مخفي' ? 'background:#334155;color:#94a3b8' : 'background:rgba(34,197,94,.15);color:var(--green)'}">
          ${p.status==='مخفي' ? '🔒 مخفي' : '✅ متاح'}
        </span>
      </div>
      <div style="font-weight:700;margin:12px 0;font-size:1.05rem;">${esc(p.name)}</div>
      <div style="font-size:1.6rem;font-weight:900;color:var(--green);">${esc(p.price)} ج</div>
      ${p.notes ? `<div style="margin-top:10px;color:var(--muted);font-size:0.85rem;">${esc(p.notes)}</div>` : ''}
      <div style="margin-top:16px;display:flex;gap:10px;">
        <button class="btn btn-ghost" style="flex:1;" onclick="openPkgModal('${p.rowIndex || ''}')">✏️ تعديل</button>
        <button class="btn btn-danger" style="flex:1;" onclick="confirmDelete('${p.rowIndex || ''}', '${esc(p.name)}')">🗑️ حذف</button>
      </div>
    </div>
  `).join('');
}

function openPkgModal(rowIndex = null) {
  const title = document.getElementById('pkgModalTitle');
  document.getElementById('pkgRowIndex').value = rowIndex || '';

  if (rowIndex) {
    title.textContent = '✏️ تعديل الباقة';
    const pkg = allPkgs.find(p => String(p.rowIndex) === String(rowIndex));
    if (pkg) {
      document.getElementById('pkgCompany').value = pkg.company || '';
      document.getElementById('pkgType').value = pkg.type || '';
      document.getElementById('pkgName').value = pkg.name || '';
      document.getElementById('pkgPrice').value = pkg.price || '';
      document.getElementById('pkgStatus').value = pkg.status || 'متاح';
      document.getElementById('pkgNotes').value = pkg.notes || '';
    }
  } else {
    title.textContent = '➕ إضافة باقة جديدة';
    document.getElementById('pkgCompany').value = '';
    document.getElementById('pkgType').value = '';
    document.getElementById('pkgName').value = '';
    document.getElementById('pkgPrice').value = '';
    document.getElementById('pkgStatus').value = 'متاح';
    document.getElementById('pkgNotes').value = '';
  }

  document.getElementById('pkgModal').classList.add('show');
}

async function savePackage() {
  const company = document.getElementById('pkgCompany').value.trim();
  const name = document.getElementById('pkgName').value.trim();
  const price = document.getElementById('pkgPrice').value.trim();
  const rowIndex = document.getElementById('pkgRowIndex').value;

  if (!company || !name || !price) {
    showToast('⚠️ يرجى ملء الحقول المطلوبة');
    return;
  }

  const btn = document.getElementById('pkgSaveBtn');
  btn.disabled = true;
  btn.innerHTML = 'جاري الحفظ...';

  try {
    const payload = {
      action: rowIndex ? 'updatePackage' : 'addPackage',
      rowIndex: rowIndex ? parseInt(rowIndex) : null,
      company, name, price,
      type: document.getElementById('pkgType').value,
      status: document.getElementById('pkgStatus').value,
      notes: document.getElementById('pkgNotes').value
    };
    const res = await gPost(payload);
    if (res.success) {
      showToast(rowIndex ? '✅ تم تعديل الباقة' : '✅ تم إضافة الباقة');
      closeModal('pkgModal');
      loadAllData();
    } else {
      showToast('❌ فشل الحفظ');
    }
  } catch(e) {
    showToast('❌ خطأ في الاتصال');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 حفظ';
  }
}

function confirmDelete(rowIndex, name) {
  if (confirm(`هل أنت متأكد من حذف الباقة: ${name}؟`)) {
    // يمكنك إضافة مودال تأكيد لاحقاً
    showToast('🗑️ تم الحذف (في النسخة الكاملة)');
    loadAllData();
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function exportToCSV() {
  if (!allOrders.length) return showToast('لا توجد بيانات للتصدير');
  let csv = "رقم_الطلب,الاسم,التليفون,الشركة,الباقة,السعر,الحالة,التاريخ\n";
  allOrders.forEach(o => {
    csv += `"${o.orderId}","${o.customerName}","${o.phone}","${o.company}","${o.package}",${o.price},"${o.status}","${o.date||''}"\n`;
  });
  const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `طلبات_${new Date().toISOString().slice(0,10)}.csv`;
  link.click();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('aw_admin')) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAllData();
  }
});
</script>
