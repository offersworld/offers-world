<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم العروض — احجز باقتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#0D0D1A; --mid:#13132B; --card:#1A1A35; --border:#2A2A50;
  --accent:#E94560; --gold:#F5A623; --purple:#7B2FBE; --text:#E8E8F0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--dark); color:var(--text); font-family:'Cairo',sans-serif; min-height:100vh; }
.container { max-width:700px; margin:auto; padding:20px 16px; }
.header { text-align:center; padding:40px 0 30px; }
.logo-ring { width:90px; height:90px; margin:auto; border-radius:50%; background:linear-gradient(135deg,#E94560,#7B2FBE); display:flex; align-items:center; justify-content:center; font-size:40px; box-shadow:0 0 30px rgba(233,69,96,.4); }
h1 { font-size:2.3rem; font-weight:900; background:linear-gradient(135deg,#F5A623,#E94560); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.form-section { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:24px; margin-bottom:16px; }
.section-title { font-size:1.1rem; font-weight:700; color:var(--gold); margin-bottom:16px; }
.companies-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.company-card { background:var(--mid); border:2px solid var(--border); border-radius:16px; padding:18px; text-align:center; cursor:pointer; transition:0.3s; }
.company-card:hover { transform:translateY(-3px); }
.company-card.selected { border-color:var(--gold); box-shadow:0 0 15px rgba(245,166,35,.3); }
.packages-list { display:flex; flex-direction:column; gap:10px; min-height:100px; }
.pkg-item { background:var(--mid); border:1.5px solid var(--border); border-radius:12px; padding:14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:0.2s; }
.pkg-item:hover { background:#2a2a50; }
.pkg-item.selected { border-color:var(--gold); background:rgba(245,166,35,.1); }
.pkg-price { font-weight:900; color:var(--accent); font-size:1.1rem; }
.loading { text-align:center; color:#f59e0b; padding:20px; }
input, textarea { width:100%; background:var(--mid); border:1.5px solid var(--border); border-radius:12px; padding:13px; color:white; margin-top:8px; }
.submit-btn { width:100%; background:linear-gradient(135deg,var(--accent),var(--purple)); border:none; border-radius:16px; padding:18px; font-size:1.1rem; font-weight:800; color:white; margin-top:15px; cursor:pointer; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1e2937; padding:12px 24px; border-radius:12px; display:none; z-index:1000; border:1px solid #f59e0b; }
.toast.show { display:block; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-ring">🌟</div>
    <h1>عالم العروض</h1>
  </div>

  <div id="mainForm">
    <div class="form-section">
      <div class="section-title">📡 اختار شركتك</div>
      <div class="companies-grid">
        <div class="company-card" onclick="selectCompany('أورانج', this)">🟠 أورانج</div>
        <div class="company-card" onclick="selectCompany('وي', this)">🟣 وي</div>
        <div class="company-card" onclick="selectCompany('اتصالات', this)">🟢 اتصالات</div>
        <div class="company-card" onclick="selectCompany('فودافون', this)">🔴 فودافون</div>
      </div>
    </div>

    <div class="form-section section-hidden" id="sectionPackage">
      <div class="section-title">📦 اختار الباقة</div>
      <div class="packages-list" id="packagesList"></div>
    </div>

    <div class="form-section section-hidden" id="sectionInfo">
      <div class="section-title">👤 بياناتك</div>
      <input type="text" id="customerName" placeholder="الاسم الكامل" oninput="updateSummary()">
      <input type="tel" id="phoneNumber" placeholder="رقم الموبايل">
      
      <div class="section-title" style="margin:20px 0 10px;">💳 طريقة الدفع</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="pay-card" onclick="selectPay(this)" style="padding:12px;border:1px solid #555;border-radius:12px;text-align:center;cursor:pointer;">
          إنستا باي<br><small>01284277707</small>
        </div>
        <div class="pay-card" onclick="selectPay(this)" style="padding:12px;border:1px solid #555;border-radius:12px;text-align:center;cursor:pointer;">
          كاش<br><small>01120228568</small>
        </div>
      </div>

      <input type="text" id="transferRef" placeholder="رقم العملية (اختياري)" style="margin-top:15px;">
      <input type="file" id="proofFile" accept="image/*" onchange="handleFile(this)" style="margin-top:15px;">
      <textarea id="notes" placeholder="ملاحظات" rows="3"></textarea>
    </div>

    <div class="summary-card" id="summaryCard" style="display:none;background:#1e2937;padding:15px;border-radius:12px;margin:15px 0;">
      <strong>ملخص الطلب:</strong><br><br>
      <span id="s-name"></span> - <span id="s-company"></span><br>
      <span id="s-package"></span> - <span id="s-price"></span>
    </div>

    <button class="submit-btn section-hidden" id="submitBtn" onclick="submitOrder()">🚀 أرسل الطلب</button>
  </div>

  <div id="successScreen" style="display:none;text-align:center;padding:60px 20px;">
    <h2>✅ تم إرسال الطلب بنجاح</h2>
    <p id="orderIdBox" style="font-size:1.2rem;margin:15px 0;"></p>
    <button onclick="location.reload()" style="padding:12px 30px;background:#E94560;border:none;border-radius:12px;color:white;">طلب جديد</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBpivEWidx2O7n0zirAEgCTXGvFE98Sda6WD-FLNzBECmfrUw7wSYI1p_HWsndLqwE/exec';

let state = { company: '', package: '', price: 0 };

async function loadPackages(companyName) {
  const container = document.getElementById('packagesList');
  container.innerHTML = `<p class="loading">جاري تحميل باقات ${companyName}...</p>`;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=packages&company=${encodeURIComponent(companyName)}`);
    const packages = await res.json();

    container.innerHTML = '';

    if (packages.length === 0) {
      container.innerHTML = `<p style="color:#f59e0b;text-align:center;">لا توجد باقات متاحة حالياً</p>`;
      return;
    }

    packages.forEach(pkg => {
      const div = document.createElement('div');
      div.className = 'pkg-item';
      div.innerHTML = `
        <div><strong>${pkg.name}</strong><br><small>${pkg.type || ''}</small></div>
        <div class="pkg-price">${pkg.price} ج</div>
      `;
      div.onclick = () => selectPkg(pkg.name, pkg.price, div);
      container.appendChild(div);
    });
  } catch (err) {
    console.error(err);
    container.innerHTML = `<p style="color:red;text-align:center;">خطأ في تحميل الباقات</p>`;
  }
}

function selectCompany(companyName, el) {
  document.querySelectorAll('.company-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  state.company = companyName;
  document.getElementById('sectionPackage').classList.remove('section-hidden');
  loadPackages(companyName);
}

function selectPkg(name, price, el) {
  document.querySelectorAll('.pkg-item').forEach(item => item.classList.remove('selected'));
  el.classList.add('selected');
  
  state.package = name;
  state.price = price;
  
  document.getElementById('sectionInfo').classList.remove('section-hidden');
  document.getElementById('summaryCard').style.display = 'block';
  document.getElementById('submitBtn').classList.remove('section-hidden');

  document.getElementById('s-name').textContent = document.getElementById('customerName').value || '-';
  document.getElementById('s-company').textContent = state.company;
  document.getElementById('s-package').textContent = name;
  document.getElementById('s-price').textContent = price + ' جنيه';
}

function selectPay(el) {
  document.querySelectorAll('.pay-card').forEach(c => c.style.borderColor = '#555');
  el.style.borderColor = '#00D4FF';
}

function handleFile(inp) {
  if (inp.files[0]) console.log('تم رفع:', inp.files[0].name);
}

async function submitOrder() {
  // يمكنك لاحقاً استبدال هذا بالكود الكامل للإرسال
  const orderId = 'ORD-' + Date.now().toString().slice(-8);
  document.getElementById('orderIdBox').innerHTML = `رقم الطلب: <strong>${orderId}</strong>`;
  document.getElementById('mainForm').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';
}

console.log('%c✅ index.html جاهز ومحسن', 'color:#22c55e;font-size:16px');
</script>
</body>
</html>
