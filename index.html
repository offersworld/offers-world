<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم العروض — احجز باقتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#0A0A14;
  --card:#12121F;
  --accent:#7B2FBE;
  --orange:#FF6B00;
  --text:#E0E0FF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0A0A14, #1A0B2E);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
}
.stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
.container { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:20px 16px; }
.logo {
  width:85px; height:85px; margin:30px auto 15px;
  background:linear-gradient(135deg,#7B2FBE,#FF6B00);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:42px; box-shadow:0 0 40px rgba(123,47,190,0.7);
}
h1 { text-align:center; font-size:1.9rem; margin-bottom:8px; }
.subtitle { text-align:center; color:#aaa; margin-bottom:30px; }
.card {
  background:var(--card); border-radius:20px; padding:20px; margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.section-title { color:#ccc; font-size:0.95rem; margin-bottom:12px; }
.company-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.company-card {
  background:#1A1A2E; border:2px solid #333; border-radius:16px;
  padding:18px 10px; text-align:center; cursor:pointer; transition:0.3s;
}
.company-card:hover { transform:translateY(-4px); }
.company-card.selected { border-color:#FF6B00; box-shadow:0 0 20px rgba(255,107,0,0.5); }
.packages-list { display:flex; flex-direction:column; gap:10px; }
.pkg-item {
  background:#1A1A2E; border:1px solid #333; border-radius:14px;
  padding:16px; cursor:pointer;
}
.pkg-item:hover { border-color:#FF6B00; }
.loading { text-align:center; padding:40px; color:#aaa; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="logo">🌟</div>
  <h1>عالم العروض</h1>
  <p class="subtitle">احجز باقتك بسهولة</p>

  <div class="card">
    <div class="section-title">اختار شركتك</div>
    <div class="company-grid">
      <div class="company-card" onclick="selectCompany('أورانج', this)">🟠 أورانج</div>
      <div class="company-card" onclick="selectCompany('وي', this)">🟣 وي</div>
      <div class="company-card" onclick="selectCompany('اتصالات', this)">🟢 اتصالات</div>
      <div class="company-card" onclick="selectCompany('فودافون', this)">🔴 فودافون</div>
    </div>
  </div>

  <div class="card" id="packageCard" style="display:none;">
    <div class="section-title">اختار الباقة</div>
    <div class="packages-list" id="packagesList"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWJml9WwlVcRTLkXyH7f34JpkWGSMqJDD60GM3YY9_7yVBm5n5Vpe6gN6KjICV2BqG/exec';

let allPackages = [];

async function loadAllPackages() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=packages`);
    allPackages = await res.json();
    console.log('✅ تم تحميل', allPackages.length, 'باقة بنجاح');
  } catch (e) {
    console.error('خطأ في تحميل الباقات', e);
  }
}

function selectCompany(companyName, el) {
  document.querySelectorAll('.company-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  document.getElementById('packageCard').style.display = 'block';

  const container = document.getElementById('packagesList');
  container.innerHTML = '<div class="loading">جاري تحميل الباقات...</div>';

  // بحث أكثر مرونة ليطابق الشيت
  const filtered = allPackages.filter(pkg => 
    pkg.company.includes(companyName)
  );

  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:#f59e0b;padding:40px;">لا توجد باقات متاحة لـ ${companyName}</div>`;
    return;
  }

  filtered.forEach(pkg => {
    const div = document.createElement('div');
    div.className = 'pkg-item';
    div.innerHTML = `<strong>${pkg.name}</strong><br><small>${pkg.type || ''}</small> — <span style="color:#22C55E">${pkg.price} جنيه</span>`;
    div.onclick = () => alert(`✅ تم اختيار:\n${pkg.name}\n${pkg.price} جنيه`);
    container.appendChild(div);
  });
}

window.onload = loadAllPackages;
</script>
</body>
</html>
