<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم العروض</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#0A0A14;
  --card:#12121F;
  --accent:#7B2FBE;
  --orange:#FF6B00;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0A0A14, #1A0B2E);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.stars {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 0;
  pointer-events: none;
}
.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 20px 16px;
}
.logo {
  width: 80px;
  height: 80px;
  margin: 30px auto 10px;
  background: linear-gradient(135deg, #7B2FBE, #FF6B00);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 38px;
  box-shadow: 0 0 40px rgba(123,47,190,0.6);
}
h1 {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 30px;
  background: linear-gradient(90deg, #fff, #FF6B00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.company-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.company-card {
  background: #1A1A2E;
  border: 2px solid #333;
  border-radius: 16px;
  padding: 20px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
}
.company-card:hover {
  transform: translateY(-5px);
  border-color: #555;
}
.company-card.selected {
  border-color: #FF6B00;
  box-shadow: 0 0 20px rgba(255,107,0,0.4);
}
.company-dot {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  margin: 0 auto 8px;
}
.packages-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.pkg-item {
  background: #1A1A2E;
  border: 1px solid #333;
  border-radius: 14px;
  padding: 16px;
  cursor: pointer;
}
.pkg-item:hover {
  border-color: #FF6B00;
}
.loading {
  text-align: center;
  padding: 40px 20px;
  color: #aaa;
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="container">
  <div class="logo">⭐</div>
  <h1>عالم العروض</h1>

  <div class="card">
    <div style="text-align:center;margin-bottom:15px;color:#aaa;font-size:0.95rem;">اختار شركتك</div>
    <div class="company-grid">
      <div class="company-card" onclick="selectCompany('وي', this)">
        <div class="company-dot" style="background:#8B5CF6;"></div>
        <div>وي</div>
      </div>
      <div class="company-card" onclick="selectCompany('أورانج', this)">
        <div class="company-dot" style="background:#FF6B00;"></div>
        <div>أورانج</div>
      </div>
      <div class="company-card" onclick="selectCompany('فودافون', this)">
        <div class="company-dot" style="background:#EF4444;"></div>
        <div>فودافون</div>
      </div>
      <div class="company-card" onclick="selectCompany('اتصالات', this)">
        <div class="company-dot" style="background:#22C55E;"></div>
        <div>اتصالات</div>
      </div>
    </div>
  </div>

  <div class="card" id="packageCard" style="display:none;">
    <div style="text-align:center;margin-bottom:15px;color:#aaa;font-size:0.95rem;">اختار الباقة</div>
    <div class="packages-list" id="packagesList"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWJml9WwlVcRTLkXyH7f34JpkWGSMqJDD60GM3YY9_7yVBm5n5Vpe6gN6KjICV2BqG/exec';

let allPackages = [];

async function loadAllPackages() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=packages`);
    allPackages = await res.json();
  } catch(e){}
}

function selectCompany(companyName, el) {
  document.querySelectorAll('.company-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');

  document.getElementById('packageCard').style.display = 'block';

  const container = document.getElementById('packagesList');
  container.innerHTML = '<div class="loading">جاري تحميل الباقات...</div>';

  const filtered = allPackages.filter(p => p.company.includes(companyName));

  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:30px;color:#aaa;">لا توجد باقات متاحة</div>';
    return;
  }

  filtered.forEach(pkg => {
    const div = document.createElement('div');
    div.className = 'pkg-item';
    div.innerHTML = `<strong>${pkg.name}</strong> — <span style="color:#22C55E">${pkg.price} جنيه</span>`;
    div.onclick = () => alert(`تم اختيار: ${pkg.name}`);
    container.appendChild(div);
  });
}

window.onload = loadAllPackages;
</script>
</body>
</html>
