<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم العروض — احجز باقتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A14;
  --card:#12121F;
  --accent:#7B2FBE;
  --orange:#FF6B00;
  --green:#22C55E;
  --text:#E0E0FF;
  --muted:#A0A0CC;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0A0A14 0%, #1A0B2E 100%);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
}

.stars { position:fixed; inset:0; z-index:0; pointer-events:none; }

.container { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:20px 16px; }

.logo {
  width: 100px; height: 100px; margin: 30px auto 10px;
  background: linear-gradient(135deg, var(--accent), var(--orange));
  border-radius: 50%; display:flex; align-items:center; justify-content:center;
  font-size: 48px; box-shadow: 0 0 50px rgba(123,47,190,0.6);
}

h1 { text-align:center; font-size:2.1rem; margin-bottom:6px; background:linear-gradient(90deg,#7B2FBE,#FF6B00); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.subtitle { text-align:center; color:var(--muted); margin-bottom:30px; font-size:1.1rem; }

.card {
  background:var(--card);
  border-radius:24px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  border:1px solid #2A2A3A;
}

.company-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap:12px;
}

.company-card {
  background:#1A1A2E;
  border:2px solid #333;
  border-radius:18px;
  padding:20px 12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  font-weight:600;
}

.company-card:hover { transform:translateY(-6px); border-color:var(--orange); }
.company-card.selected { 
  border-color:var(--orange); 
  box-shadow:0 0 25px rgba(255,107,0,0.5);
  background:#2A1A2E;
}

.packages-list { display:flex; flex-direction:column; gap:12px; }

.pkg-item {
  background:#1A1A2E;
  border:1px solid #333;
  border-radius:16px;
  padding:18px;
  cursor:pointer;
  transition:0.3s;
}

.pkg-item:hover, .pkg-item.selected {
  border-color:var(--orange);
  transform:translateX(8px);
}

.form-group { margin-bottom:18px; }
label { display:block; margin-bottom:8px; color:var(--muted); font-size:0.95rem; }
input, select, textarea {
  width:100%;
  padding:14px 16px;
  background:#1A1A2E;
  border:1px solid #444;
  border-radius:12px;
  color:white;
  font-size:1rem;
}

.upload-area {
  border:2px dashed #555;
  border-radius:16px;
  padding:30px 20px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}
.upload-area:hover { border-color:var(--accent); }

.preview { max-width:100%; max-height:280px; margin-top:12px; border-radius:12px; display:none; }

.btn {
  width:100%;
  padding:16px;
  font-size:1.1rem;
  font-weight:700;
  border:none;
  border-radius:16px;
  cursor:pointer;
  margin-top:10px;
}

.btn-primary {
  background: linear-gradient(90deg, var(--accent), var(--orange));
  color:white;
}

.btn-success {
  background:#22C55E;
  color:black;
}

.success-screen { text-align:center; padding:50px 20px; display:none; }
</style>
</head>
<body>
<div class="stars"></div>

<div class="container">
  <div class="logo">🌟</div>
  <h1>عالم العروض</h1>
  <p class="subtitle">احجز باقتك بسهولة وسرعة</p>

  <!-- Step 1: الشركات -->
  <div class="card" id="step1">
    <h2 style="text-align:center;margin-bottom:20px;">اختر الشركة</h2>
    <div class="company-grid" id="companyGrid"></div>
  </div>

  <!-- Step 2: الباقات -->
  <div class="card" id="step2" style="display:none;">
    <h2 style="margin-bottom:20px;">اختر الباقة</h2>
    <div class="packages-list" id="packagesList"></div>
    <button class="btn" onclick="backToStep1()" style="background:#444;color:white;">← العودة للشركات</button>
  </div>

  <!-- Step 3: بيانات الحجز -->
  <div class="card" id="step3" style="display:none;">
    <h2 style="margin-bottom:20px;">إتمام الحجز</h2>
    
    <div class="form-group">
      <label>الاسم الكامل</label>
      <input type="text" id="customerName" placeholder="أدخل اسمك">
    </div>
    
    <div class="form-group">
      <label>رقم الواتساب</label>
      <input type="tel" id="phone" placeholder="01xxxxxxxxx">
    </div>

    <div class="form-group">
      <label>طريقة الدفع</label>
      <select id="paymentMethod">
        <option value="">اختر طريقة الدفع</option>
        <option value="فودافون كاش">فودافون كاش</option>
        <option value="أورنج كاش">أورنج كاش</option>
        <option value="وي كاش">وي كاش</option>
        <option value="تحويل بنكي">تحويل بنكي</option>
      </select>
    </div>

    <div class="form-group">
      <label>رقم التحويل</label>
      <input type="text" id="transferRef" placeholder="رقم العملية (اختياري)">
    </div>

    <div class="form-group">
      <label>إثبات الدفع (صورة)</label>
      <div class="upload-area" onclick="document.getElementById('proofUpload').click()">
        📸 اضغط هنا لرفع صورة الإيصال
      </div>
      <input type="file" id="proofUpload" accept="image/*" style="display:none;" onchange="previewImage(event)">
      <img id="previewImg" class="preview">
    </div>

    <button class="btn btn-primary" onclick="submitOrder()">✅ تأكيد وإرسال الطلب</button>
  </div>

  <!-- شاشة النجاح -->
  <div class="card success-screen" id="successScreen">
    <h2 style="color:#22C55E;">🎉 تم إرسال الطلب بنجاح!</h2>
    <p id="orderIdDisplay" style="font-size:1.4rem; margin:20px 0;"></p>
    <p style="color:var(--muted);">سيتم تفعيل الباقة خلال دقائق</p>
    <button class="btn btn-success" onclick="location.reload()">طلب باقة جديدة</button>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzWJml9WwlVcRTLkXyH7f34JpkWGSMqJDD60GM3YY9_7yVBm5n5Vpe6gN6KjICV2BqG/exec';

let allPackages = [];
let selectedCompany = '';
let selectedPackage = null;
let proofBase64 = '';

async function loadAllPackages() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=packages`);
    allPackages = await res.json();
  } catch (e) { console.error(e); }
}

function showCompanies() {
  const companies = [
    {name:'أورانج', emoji:'🟠'},
    {name:'وي', emoji:'🟣'},
    {name:'اتصالات', emoji:'🟢'},
    {name:'فودافون', emoji:'🔴'}
  ];

  const grid = document.getElementById('companyGrid');
  grid.innerHTML = companies.map(c => `
    <div class="company-card" onclick="selectCompany('${c.name}', this)">
      ${c.emoji} ${c.name}
    </div>
  `).join('');
}

function selectCompany(company, el) {
  document.querySelectorAll('.company-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  
  selectedCompany = company;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  renderPackages(company);
}

function renderPackages(company) {
  const container = document.getElementById('packagesList');
  container.innerHTML = '<div class="loading">جاري تحميل الباقات...</div>';

  const filtered = allPackages.filter(p => p.company.includes(company));

  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = `<p style="text-align:center;padding:40px;color:#f59e0b;">لا توجد باقات حالياً</p>`;
    return;
  }

  filtered.forEach(pkg => {
    const div = document.createElement('div');
    div.className = 'pkg-item';
    div.innerHTML = `
      <strong>${pkg.name}</strong><br>
      <small>${pkg.type || ''}</small><br>
      <span style="color:#22C55E;font-size:1.35rem;font-weight:700;">${pkg.price} جنيه</span>
    `;
    div.onclick = () => {
      document.querySelectorAll('.pkg-item').forEach(i => i.classList.remove('selected'));
      div.classList.add('selected');
      selectedPackage = pkg;
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'block';
    };
    container.appendChild(div);
  });
}

function backToStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
}

function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    proofBase64 = ev.target.result;
    document.getElementById('previewImg').src = proofBase64;
    document.getElementById('previewImg').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitOrder() {
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const payment = document.getElementById('paymentMethod').value;
  const ref = document.getElementById('transferRef').value.trim();

  if (!name || !phone || !selectedPackage) {
    alert('❌ يرجى ملء الاسم ورقم التليفون واختيار باقة');
    return;
  }

  const data = {
    customerName: name,
    phone: phone,
    company: selectedCompany,
    package: selectedPackage.name,
    price: selectedPackage.price,
    payment: payment,
    transferRef: ref,
    proofBase64: proofBase64
  };

  try {
    const res = await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(data) });
    const result = await res.json();

    if (result.success) {
      document.getElementById('step3').style.display = 'none';
      document.getElementById('successScreen').style.display = 'block';
      document.getElementById('orderIdDisplay').innerHTML = `رقم الطلب: <strong>${result.orderId}</strong>`;
    }
  } catch (err) {
    alert('حدث خطأ في الإرسال');
  }
}

window.onload = () => {
  loadAllPackages();
  showCompanies();
};
</script>
</body>
</html>
