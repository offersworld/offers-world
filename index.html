<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عالم العروض — احجز باقتك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0A0A14;
  --card: #12121F;
  --accent: #7B2FBE;
  --orange: #FF6B00;
  --green: #22C55E;
  --text: #E0E0FF;
  --muted: #94A3B8;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: linear-gradient(135deg, #0A0A14 0%, #1A0B2E 100%);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

.stars { 
  position: fixed; 
  inset: 0; 
  z-index: 0; 
  pointer-events: none; 
  background: #0A0A14;
  overflow: hidden;
}

/* نجوم CSS نقية (بدون صور خارجية) */
.stars::before,
.stars::after {
  content: '';
  position: absolute;
  inset: 0;
  background: transparent;
  animation: twinkle 8s infinite alternate;
}

.stars::before {
  background-image: 
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-position: 0 0, 50px 50px;
  background-size: 80px 80px;
  opacity: 0.15;
}

.stars::after {
  background-image: 
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px);
  background-position: 30px 30px, 80px 80px;
  background-size: 100px 100px;
  opacity: 0.1;
  animation-delay: 3s;
}

@keyframes twinkle {
  0% { opacity: 0.08; }
  100% { opacity: 0.25; }
}

.container { 
  position:relative; z-index:1; max-width:480px; margin:0 auto; padding:20px 16px; 
}

.logo {
  width:110px; height:110px; margin:30px auto 10px;
  background: linear-gradient(135deg, var(--accent), var(--orange));
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:52px; box-shadow:0 0 60px rgba(123,47,190,0.7);
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

h1 { 
  text-align:center; font-size:2.2rem; margin-bottom:6px; 
  background: linear-gradient(90deg, #fff, #c4b5fd); 
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; 
}
.subtitle { text-align:center; color:var(--muted); margin-bottom:35px; font-size:1.1rem; }

.card {
  background:var(--card);
  border-radius:24px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  border:1px solid rgba(123,47,190,0.2);
}

.section-title {
  color:#ddd;
  font-size:1.1rem;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:8px;
}

.company-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.company-card {
  background:#1A1A2E;
  border:2px solid #333;
  border-radius:20px;
  padding:22px 12px;
  text-align:center;
  cursor:pointer;
  transition:0.4s;
  font-weight:600;
  font-size:1.1rem;
}
.company-card:hover { border-color:var(--orange); transform:scale(1.05); }
.company-card.selected {
  border-color:var(--orange);
  background:rgba(255,107,0,0.12);
  box-shadow:0 0 30px rgba(255,107,0,0.4);
}

.filter-tabs {
  display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;
}
.filter-tab {
  padding:9px 18px;
  background:#1A1A2E;
  border:1px solid #444;
  border-radius:30px;
  cursor:pointer;
  font-size:0.95rem;
  transition:0.3s;
}
.filter-tab.active {
  background:var(--accent);
  border-color:var(--accent);
  color:white;
}

.packages-list { display:flex; flex-direction:column; gap:12px; }

.pkg-item {
  background:#1A1A2E;
  border:1px solid #444;
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:0.3s;
}
.pkg-item:hover { border-color:var(--green); transform:translateX(8px); }
.pkg-item.selected { border-color:var(--green); background:rgba(34,197,94,0.1); }

.preview-container {
  margin:15px 0;
  text-align:center;
}
#imagePreview {
  max-width:100%;
  max-height:280px;
  border-radius:16px;
  border:2px solid var(--green);
  display:none;
}

input, select, textarea {
  width:100%;
  padding:14px 16px;
  margin:10px 0;
  background:#1A1A2E;
  border:1px solid #444;
  border-radius:12px;
  color:white;
  font-size:1rem;
}

.btn {
  width:100%;
  padding:16px;
  font-size:1.1rem;
  font-weight:700;
  border:none;
  border-radius:16px;
  cursor:pointer;
  margin-top:12px;
  transition:0.3s;
}
.btn-primary { background: linear-gradient(90deg, var(--accent), #A855F7); color:white; }
.btn-success { background: linear-gradient(90deg, #22C55E, #86EFAC); color:black; }

.loading { text-align:center; padding:50px 20px; color:var(--muted); font-size:1.1rem; }
.step { display:none; }
.step.active { display:block; animation: fadeIn 0.5s; }
@keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

.success-screen { 
  text-align:center; padding:50px 20px; background:var(--card); 
  border-radius:24px; 
}
.success-screen h2 { color:var(--green); margin:20px 0; font-size:1.8rem; }
</style>
</head>
<body>

<div class="stars"></div>
<div class="container">

  <div class="logo">🌟</div>
  <h1>عالم العروض</h1>
  <p class="subtitle">احجز باقتك بسهولة وسرعة</p>

  <!-- Loading -->
  <div id="loading" class="loading">جاري تحميل الباقات...</div>

  <!-- Step 1: اختيار الشركة -->
  <div id="step1" class="step card">
    <div class="section-title">اختر الشركة</div>
    <div class="company-grid" id="companyGrid"></div>
  </div>

  <!-- Step 2: اختيار الباقة -->
  <div id="step2" class="step card">
    <div class="section-title">اختر الباقة</div>
    
    <div class="filter-tabs" id="filterTabs">
      <div class="filter-tab active" data-filter="all">الكل</div>
      <div class="filter-tab" data-filter="جيجا">جيجا</div>
      <div class="filter-tab" data-filter="دقايق">دقايق</div>
      <div class="filter-tab" data-filter="ميكس">ميكس</div>
    </div>

    <div class="packages-list" id="packagesList"></div>
    <button class="btn" onclick="backToCompanies()">← رجوع للشركات</button>
  </div>

  <!-- Step 3: بيانات الحجز + رفع إيصال -->
  <div id="step3" class="step card">
    <div class="section-title">بيانات الحجز</div>
    <input type="text" id="customerName" placeholder="اسمك الكامل">
    <input type="tel" id="phone" placeholder="رقم الواتساب">

    <select id="paymentMethod">
      <option value="">طريقة الدفع</option>
      <option value="فودافون كاش">فودافون كاش</option>
      <option value="أورانج كاش">أورانج كاش</option>
      <option value="إنستا باي">إنستا باي</option>
      <option value="تحويل بنكي">تحويل بنكي</option>
    </select>

    <input type="text" id="transferRef" placeholder="رقم التحويل أو المرجع">
    <textarea id="notes" rows="2" placeholder="ملاحظات (اختياري)"></textarea>

    <div class="section-title">ارفع إيصال الدفع</div>
    <input type="file" id="proofUpload" accept="image/*" onchange="previewImage(event)">
    <div class="preview-container">
      <img id="imagePreview" alt="معاينة الإيصال">
    </div>

    <button class="btn btn-primary" onclick="submitOrder()">تأكيد وإرسال الطلب</button>
  </div>

  <!-- Success Screen -->
  <div id="successScreen" class="step success-screen">
    <h2>✅ تم استلام طلبك بنجاح!</h2>
    <p id="orderIdDisplay" style="font-size:1.5rem; color:var(--green); margin:15px 0;"></p>
    <p>سيتم مراجعة وتفعيل طلبك خلال دقائق</p>
    <button class="btn btn-success" onclick="restart()">طلب باقة جديدة</button>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkKqqWdy5mRM4Vf48kbJFvAeWsaWpp2wXXYCWfAS18_9zBB1zJ90-Zr9ANvH829rc/exec'; 
// ← غير الرابط ده بالرابط الجديد بعد إعادة النشر

let allPackages = [];
let selectedCompany = '';
let selectedPackage = null;
let proofBase64 = '';

async function loadPackages() {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=packages`);
    allPackages = await res.json();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    createCompanyCards();
  } catch(e) {
    document.getElementById('loading').innerHTML = '❌ خطأ في الاتصال<br><button onclick="location.reload()">إعادة المحاولة</button>';
  }
}

function createCompanyCards() {
  const companies = ['أورانج', 'وي', 'اتصالات', 'فودافون'];
  const grid = document.getElementById('companyGrid');
  grid.innerHTML = '';

  companies.forEach(name => {
    const emoji = name === 'أورانج' ? '🟠' : name === 'وي' ? '🟣' : name === 'اتصالات' ? '🟢' : '🔴';
    const div = document.createElement('div');
    div.className = 'company-card';
    div.innerHTML = `${emoji}<br>${name}`;
    div.onclick = () => selectCompany(name, div);
    grid.appendChild(div);
  });
}

function selectCompany(company, el) {
  document.querySelectorAll('.company-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedCompany = company;
  showStep(2);
  filterPackages('all');
}

function filterPackages(type) {
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.filter === type);
  });

  const container = document.getElementById('packagesList');
  container.innerHTML = '';

  let filtered = allPackages.filter(p => p.company.includes(selectedCompany));

  if (type !== 'all') {
    filtered = filtered.filter(p => {
      const text = (p.name + ' ' + (p.type || '')).toLowerCase();
      if (type === 'جيجا') return text.includes('جيجا');
      if (type === 'دقايق') return text.includes('دقيقة') || text.includes('دقايق');
      if (type === 'ميكس') return text.includes('ميكس');
      return true;
    });
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:#f59e0b;">لا توجد باقات في هذا التصنيف</div>`;
    return;
  }

  filtered.forEach(pkg => {
    const div = document.createElement('div');
    div.className = 'pkg-item';
    div.innerHTML = `
      <strong>${pkg.name}</strong><br>
      <small>${pkg.type || ''}</small>
      <div style="margin-top:10px;color:var(--green);font-size:1.4rem;font-weight:700;">${pkg.price} جنيه</div>
    `;
    div.onclick = () => {
      document.querySelectorAll('.pkg-item').forEach(i => i.classList.remove('selected'));
      div.classList.add('selected');
      selectedPackage = pkg;
      showStep(3);
    };
    container.appendChild(div);
  });
}

function showStep(step) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById(`step${step}`).classList.add('active');
}

function backToCompanies() {
  showStep(1);
}

function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    proofBase64 = ev.target.result;
    const preview = document.getElementById('imagePreview');
    preview.src = proofBase64;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function submitOrder() {
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if (!name || !phone || !selectedPackage) {
    alert("❌ برجاء إدخال الاسم ورقم التليفون واختيار باقة");
    return;
  }

  const formData = {
    customerName: name,
    phone: phone,
    company: selectedCompany,
    package: selectedPackage.name,
    price: selectedPackage.price,
    payment: document.getElementById('paymentMethod').value,
    transferRef: document.getElementById('transferRef').value,
    notes: document.getElementById('notes').value,
    proofBase64: proofBase64
  };

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const result = await res.json();

    if (result.success) {
      document.getElementById('orderIdDisplay').textContent = `رقم الطلب: ${result.orderId}`;
      showStep(4);
    } else {
      alert("حدث خطأ: " + (result.error || 'حاول مرة أخرى'));
    }
  } catch(e) {
    console.error(e);
    alert("❌ خطأ في الاتصال بالسيرفر\nتأكد من نشر الـ Web App بشكل صحيح (Anyone)");
  }
}

function restart() {
  location.reload();
}

// تفعيل الفلاتر
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => filterPackages(tab.dataset.filter));
  });
});

window.onload = loadPackages;
</script>
</body>
</html>
